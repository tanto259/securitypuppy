<header class="site-header">
  <nav class="site-nav container" aria-label="Main navigation">
    <a class="site-title" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>

    <ul class="nav-links" id="nav-menu">
      {{ $currentPage := . }}
      {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL | relURL }}"
             {{ if $currentPage.IsMenuCurrent "main" . }}aria-current="page"{{ end }}>
            {{ .Name }}
          </a>
        </li>
      {{ end }}
      {{/* Fallback nav if no menu configured */}}
      {{ if not .Site.Menus.main }}
        <li><a href="{{ "/" | relURL }}" {{ if .IsHome }}aria-current="page"{{ end }}>/home</a></li>
        <li><a href="{{ "/links/" | relURL }}" {{ if eq .RelPermalink "/links/" }}aria-current="page"{{ end }}>/links</a></li>
        <li><a href="{{ "/words/" | relURL }}" {{ if eq .RelPermalink "/words/" }}aria-current="page"{{ end }}>/words</a></li>
        <li><a href="{{ "/training/" | relURL }}" {{ if eq .RelPermalink "/training/" }}aria-current="page"{{ end }}>/training</a></li>
        <li><a href="{{ "/contact/" | relURL }}" {{ if eq .RelPermalink "/contact/" }}aria-current="page"{{ end }}>/contact</a></li>
      {{ end }}
    </ul>

    <div class="nav-utils">
      <button class="nav-btn theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
        <span class="theme-icon-sun" aria-hidden="true">☀</span>
        <span class="theme-icon-moon" aria-hidden="true">☾</span>
      </button>
      <button class="nav-btn search-trigger" id="search-trigger" aria-label="Open search (Cmd+K)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="6.5" cy="6.5" r="5.5"/>
          <line x1="10.5" y1="10.5" x2="15" y2="15"/>
        </svg>
      </button>
      <button class="nav-btn hamburger" id="nav-hamburger" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
  </nav>
</header>
